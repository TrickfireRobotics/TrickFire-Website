<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Single Page Apps for GitHub Pages</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages
      // This script handles routing for SPAs on GitHub Pages

      var l = window.location;
      if (l.pathname !== "/" && !l.pathname.endsWith(".html")) {
        // If we're not at root and not accessing a specific file,
        // redirect to the root with the path as a query parameter
        var pathAndQuery =
          l.pathname.slice(1) + (l.search ? "&" + l.search.slice(1) : "");
        window.location.replace(
          l.protocol +
            "//" +
            l.host +
            "/?redirect=" +
            encodeURIComponent("/" + pathAndQuery) +
            l.hash,
        );
      }
    </script>
  </head>
  <body></body>
</html>
